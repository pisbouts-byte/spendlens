services:
  - type: web
    name: spendlens-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: cd server && ./node_modules/.bin/prisma migrate deploy && ./node_modules/.bin/tsx src/index.ts
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: spendlens-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: spendlens-client
    runtime: static
    region: oregon
    plan: free
    buildCommand: chmod +x render-build-client.sh && ./render-build-client.sh
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://spendlens-api-0gjs.onrender.com/api

databases:
  - name: spendlens-db
    plan: free
    region: oregon
