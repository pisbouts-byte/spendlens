services:
  - type: web
    name: spendlens-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm install -g pnpm@9 &&
      pnpm install --frozen-lockfile &&
      cd server && npx prisma generate && cd .. &&
      pnpm --filter @spendlens/shared build &&
      pnpm --filter @spendlens/server build
    startCommand: cd server && npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: spendlens-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: spendlens-db
    plan: free
    region: oregon
